<!DOCTYPE html>
<html>
<head>
  <title>Exercise 1 - Rotating Cube</title>
  <style>
    body { margin: 0; overflow: hidden; background: #07111f; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";

const scene = new THREE.Scene();
scene.background = new THREE.Color("#49d4");

const camera = new THREE.PerspectiveCamera(
  60,
  2,
  0.1,
  1000
);
camera.position.set(3, 3, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(0, 500, 1050);

const lightTwo = new THREE.DirectionalLight(0xffffff, 2);
lightTwo.position.set(0, -500, -100);
scene.add(light);
scene.add(lightTwo);

const geometry = new THREE.BoxGeometry(1.2, 1, 2);
const material = new THREE.MeshStandardMaterial({ color: 0x33ff99 });
const cube = new THREE.Mesh(geometry, material);
scene.add(cube);

function animate() {
  requestAnimationFrame(animate);
  cube.rotation.x += 0.01;
  cube.rotation.y += 0.02;
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
