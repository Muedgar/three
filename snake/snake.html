<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Snake - Three.js</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07111f;
      color: white;
    }

    #ui {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(10px);
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.5;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    #score {
      font-size: 22px;
      font-weight: 800;
    }

    #hint {
      color: rgba(255, 255, 255, 0.75);
      font-size: 13px;
      margin-top: 4px;
    }

    #message {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      z-index: 20;
      background: rgba(2, 8, 18, 0.58);
      backdrop-filter: blur(5px);
      text-align: center;
    }

    #message.show {
      display: grid;
    }

    .panel {
      width: min(420px, calc(100vw - 32px));
      padding: 30px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.16);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
    }

    .panel h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .panel p {
      color: rgba(255, 255, 255, 0.78);
      margin-bottom: 20px;
    }

    button {
      border: 0;
      padding: 12px 18px;
      border-radius: 999px;
      background: white;
      color: #07111f;
      font-weight: 800;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="hint">Move: Arrow keys / WASD · Restart: R</div>
  </div>

  <div id="message">
    <div class="panel">
      <h1>Game Over</h1>
      <p id="finalScore">Score: 0</p>
      <button onclick="restartGame()">Restart</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x07111f);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(10, 14, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.minDistance = 14;
    controls.maxDistance = 32;

    const BOARD_SIZE = 15;
    const CELL_SIZE = 1;
    const MOVE_EVERY_MS = 140;

    const scoreEl = document.getElementById("score");
    const messageEl = document.getElementById("message");
    const finalScoreEl = document.getElementById("finalScore");

    const snakeMaterial = new THREE.MeshStandardMaterial({ color: 0x33ff99, roughness: 0.45 });
    const headMaterial = new THREE.MeshStandardMaterial({ color: 0xc8ff4d, roughness: 0.35 });
    const foodMaterial = new THREE.MeshStandardMaterial({ color: 0xff3d71, roughness: 0.3, emissive: 0x551022 });
    const boardMaterial = new THREE.MeshStandardMaterial({ color: 0x12233a, roughness: 0.75 });
    const gridMaterial = new THREE.LineBasicMaterial({ color: 0x335170, transparent: true, opacity: 0.5 });

    const cubeGeometry = new THREE.BoxGeometry(0.86, 0.86, 0.86);
    const foodGeometry = new THREE.SphereGeometry(0.42, 32, 32);

    let snake = [];
    let direction = { x: 1, z: 0 };
    let nextDirection = { x: 1, z: 0 };
    let food = { x: 4, z: 4 };
    let score = 0;
    let gameOver = false;
    let lastMoveTime = 0;
    let snakeMeshes = [];
    let foodMesh;

    setupLights();
    createBoard();
    createFoodMesh();
    restartGame();
    animate(0);

    function setupLights() {
      const ambient = new THREE.AmbientLight(0xffffff, 0.55);
      scene.add(ambient);

      const keyLight = new THREE.DirectionalLight(0xffffff, 1.8);
      keyLight.position.set(10, 18, 8);
      keyLight.castShadow = true;
      keyLight.shadow.mapSize.width = 2048;
      keyLight.shadow.mapSize.height = 2048;
      scene.add(keyLight);

      const rimLight = new THREE.PointLight(0x66ccff, 1.8, 40);
      rimLight.position.set(-10, 8, -10);
      scene.add(rimLight);
    }

    function createBoard() {
      const boardGeometry = new THREE.BoxGeometry(BOARD_SIZE, 0.3, BOARD_SIZE);
      const board = new THREE.Mesh(boardGeometry, boardMaterial);
      board.position.y = -0.25;
      board.receiveShadow = true;
      scene.add(board);

      const half = BOARD_SIZE / 2;
      const points = [];

      for (let i = -half; i <= half; i++) {
        points.push(new THREE.Vector3(i, 0.01, -half), new THREE.Vector3(i, 0.01, half));
        points.push(new THREE.Vector3(-half, 0.01, i), new THREE.Vector3(half, 0.01, i));
      }

      const gridGeometry = new THREE.BufferGeometry().setFromPoints(points);
      const grid = new THREE.LineSegments(gridGeometry, gridMaterial);
      scene.add(grid);
    }

    function createFoodMesh() {
      foodMesh = new THREE.Mesh(foodGeometry, foodMaterial);
      foodMesh.castShadow = true;
      scene.add(foodMesh);
    }

    function restartGame() {
      snake = [
        { x: 0, z: 0 },
        { x: -1, z: 0 },
        { x: -2, z: 0 }
      ];

      direction = { x: 1, z: 0 };
      nextDirection = { x: 1, z: 0 };
      score = 0;
      gameOver = false;
      lastMoveTime = 0;
      messageEl.classList.remove("show");
      spawnFood();
      updateScore();
      rebuildSnakeMeshes();
    }

    window.restartGame = restartGame;

    function rebuildSnakeMeshes() {
      for (const mesh of snakeMeshes) scene.remove(mesh);
      snakeMeshes = [];

      for (let i = 0; i < snake.length; i++) {
        const mesh = new THREE.Mesh(cubeGeometry, i === 0 ? headMaterial : snakeMaterial);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        snakeMeshes.push(mesh);
      }

      syncSnakeMeshes();
    }

    function syncSnakeMeshes() {
      while (snakeMeshes.length < snake.length) {
        const mesh = new THREE.Mesh(cubeGeometry, snakeMaterial);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        snakeMeshes.push(mesh);
      }

      snake.forEach((part, index) => {
        const mesh = snakeMeshes[index];
        mesh.position.set(part.x, 0.45, part.z);
        mesh.material = index === 0 ? headMaterial : snakeMaterial;
      });
    }

    function moveSnake() {
      if (gameOver) return;

      direction = nextDirection;
      const head = snake[0];
      const newHead = {
        x: head.x + direction.x,
        z: head.z + direction.z
      };

      if (hitWall(newHead) || hitSelf(newHead)) {
        endGame();
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.z === food.z) {
        score++;
        updateScore();
        spawnFood();
      } else {
        snake.pop();
      }

      syncSnakeMeshes();
    }

    function hitWall(position) {
      const limit = Math.floor(BOARD_SIZE / 2);
      return position.x < -limit || position.x > limit || position.z < -limit || position.z > limit;
    }

    function hitSelf(position) {
      return snake.some(part => part.x === position.x && part.z === position.z);
    }

    function spawnFood() {
      const limit = Math.floor(BOARD_SIZE / 2);
      let newFood;

      do {
        newFood = {
          x: randomInt(-limit, limit),
          z: randomInt(-limit, limit)
        };
      } while (snake.some(part => part.x === newFood.x && part.z === newFood.z));

      food = newFood;
      foodMesh.position.set(food.x, 0.5, food.z);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function updateScore() {
      scoreEl.textContent = `Score: ${score}`;
    }

    function endGame() {
      gameOver = true;
      finalScoreEl.textContent = `Final score: ${score}`;
      messageEl.classList.add("show");
    }

    function animate(time) {
      requestAnimationFrame(animate);

      if (time - lastMoveTime > MOVE_EVERY_MS) {
        moveSnake();
        lastMoveTime = time;
      }

      foodMesh.rotation.y += 0.035;
      foodMesh.position.y = 0.5 + Math.sin(time * 0.006) * 0.12;

      for (let i = 0; i < snakeMeshes.length; i++) {
        snakeMeshes[i].scale.setScalar(i === 0 ? 1.08 : 1);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();

      if (key === "r") {
        restartGame();
        return;
      }

      const requestedDirection = getDirectionFromKey(key);
      if (!requestedDirection) return;

      const isOpposite =
        requestedDirection.x + direction.x === 0 &&
        requestedDirection.z + direction.z === 0;

      if (!isOpposite) {
        nextDirection = requestedDirection;
      }
    });

    function getDirectionFromKey(key) {
      if (key === "arrowup" || key === "w") return { x: 0, z: -1 };
      if (key === "arrowdown" || key === "s") return { x: 0, z: 1 };
      if (key === "arrowleft" || key === "a") return { x: -1, z: 0 };
      if (key === "arrowright" || key === "d") return { x: 1, z: 0 };
      return null;
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
