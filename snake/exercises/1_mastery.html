<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #071;
        }
    </style>
</head>
<body>
        <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
    import * as THREE from "three";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#9ee7ff");

    const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );

    camera.position.set(7, 4.5, 8);
    camera.lookAt(0, 0.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(5, 10, 8);
    sun.castShadow = true;
    scene.add(sun);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));

    // helpers
    function box(w, h, d, color, x, y, z) {
        const mesh = new THREE.Mesh(
            new THREE.BoxGeometry(w, h, d),
            new THREE.MeshStandardMaterial({
                color,
                roughness: 0.35,
                metalness: 0.15
            })
        )

        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
    }

    function cylinder(radius, depth, color, x, y, z, rotate = true) {
        const mesh = new THREE.Mesh(
            new THREE.CylinderGeometry(radius, radius, depth, 48),
            new THREE.MeshStandardMaterial({
                color,
                roughness: 0.45,
                metalness: 0.2
            })
        );

        if (rotate) mesh.rotation.x = Math.PI / 2;
        mesh.position.set(x, y, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        return mesh;
    }

    const car = new THREE.Group();

    //  Car body
    const lowerBody = box(4.8, 0.7, 2.05, 0x1565c0, 0, 0.35, 0);
    car.add(lowerBody);

    const hood = box(1.5, 0.45, 1.85, 0x1976d2, 1.65, 0.75, 0);
    car.add(hood);

    const trunk = box(1.3, 0.45, 1.85, 0x1976d2, -1.75, 0.75, 0);
    car.add(trunk);

    const cabin = box(1.8, 1.0, 1.55, 0x0f172a, -0.25, 1.25, 0);
    cabin.scale.set(1, 1, 0.95);
    car.add(cabin);

    // Glasses

    const tire = cylinder(.4, .4, 0x329828, 0, 2, 1)
    car.add(tire)

    scene.add(car);

    renderer.render(scene, camera);
</script>
</body>
</html>
