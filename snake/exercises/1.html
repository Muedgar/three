<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #071;
        }
    </style>
</head>
<body>
    <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from "three";

  const scene = new THREE.Scene();
  scene.background = new THREE.Color("#9ee7ff");

  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(7, 4.5, 8);
  camera.lookAt(0, 0.5, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  const sun = new THREE.DirectionalLight(0xffffff, 2.5);
  sun.position.set(5, 10, 8);
  sun.castShadow = true;
  scene.add(sun);

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));

  // ---------- Helpers ----------
  function box(w, h, d, color, x, y, z) {
    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, d),
      new THREE.MeshStandardMaterial({
        color,
        roughness: 0.35,
        metalness: 0.15,
      })
    );

    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }

  function cylinder(radius, depth, color, x, y, z, rotate = true) {
    const mesh = new THREE.Mesh(
      new THREE.CylinderGeometry(radius, radius, depth, 48),
      new THREE.MeshStandardMaterial({
        color,
        roughness: 0.45,
        metalness: 0.2,
      })
    );

    if (rotate) mesh.rotation.x = Math.PI / 2;
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    return mesh;
  }

  const car = new THREE.Group();

  // ---------- Car Body ----------
  const lowerBody = box(4.8, 0.7, 2.05, 0x1565c0, 0, 0.35, 0);
  car.add(lowerBody);

  const hood = box(1.5, 0.45, 1.85, 0x1976d2, 1.65, 0.75, 0);
  car.add(hood);

  const trunk = box(1.3, 0.45, 1.85, 0x1976d2, -1.75, 0.75, 0);
  car.add(trunk);

  const cabin = box(1.8, 1.0, 1.55, 0x0f172a, -0.25, 1.25, 0);
  cabin.scale.set(1, 1, 0.95);
  car.add(cabin);

  // Glass
  const windshield = box(0.08, 0.7, 1.35, 0x8fd3ff, 0.75, 1.25, 0);
  windshield.rotation.z = -0.35;
  car.add(windshield);

  const rearWindow = box(0.08, 0.65, 1.35, 0x8fd3ff, -1.15, 1.25, 0);
  rearWindow.rotation.z = 0.35;
  car.add(rearWindow);

  const leftWindow = box(1.15, 0.55, 0.08, 0x8fd3ff, -0.25, 1.3, 0.82);
  const rightWindow = box(1.15, 0.55, 0.08, 0x8fd3ff, -0.25, 1.3, -0.82);
  car.add(leftWindow, rightWindow);

  // Bumpers
  car.add(box(0.25, 0.35, 2.15, 0x111827, 2.55, 0.25, 0));
  car.add(box(0.25, 0.35, 2.15, 0x111827, -2.55, 0.25, 0));

  // Grille
  car.add(box(0.08, 0.35, 0.95, 0x020617, 2.68, 0.45, 0));

  for (let z = -0.35; z <= 0.35; z += 0.23) {
    car.add(box(0.09, 0.03, 0.12, 0xcbd5e1, 2.73, 0.48, z));
  }

  // Lights
  car.add(box(0.12, 0.22, 0.42, 0xfff7a8, 2.62, 0.55, 0.63));
  car.add(box(0.12, 0.22, 0.42, 0xfff7a8, 2.62, 0.55, -0.63));

  car.add(box(0.12, 0.22, 0.42, 0xff2222, -2.62, 0.55, 0.63));
  car.add(box(0.12, 0.22, 0.42, 0xff2222, -2.62, 0.55, -0.63));

  // Side mirrors
  car.add(box(0.28, 0.18, 0.08, 0x111827, 0.75, 1.2, 1.1));
  car.add(box(0.28, 0.18, 0.08, 0x111827, 0.75, 1.2, -1.1));

  // Door lines
  car.add(box(0.03, 0.65, 0.04, 0x0f172a, -0.15, 0.65, 1.04));
  car.add(box(0.03, 0.65, 0.04, 0x0f172a, -0.15, 0.65, -1.04));

  // Door handles
  car.add(box(0.35, 0.08, 0.06, 0xe2e8f0, 0.15, 0.75, 1.08));
  car.add(box(0.35, 0.08, 0.06, 0xe2e8f0, 0.15, 0.75, -1.08));

  // ---------- Wheels ----------
  function createWheel(x, z) {
    const tire = cylinder(0.48, 0.48, 0x050505, x, -0.08, z);
    car.add(tire);

    const rim = cylinder(0.28, 0.52, 0xd1d5db, x, -0.08, z);
    car.add(rim);

    const hub = cylinder(0.12, 0.56, 0x64748b, x, -0.08, z);
    car.add(hub);

    // Simple spokes
    for (let i = 0; i < 6; i++) {
      const spoke = box(0.06, 0.03, 0.45, 0xe5e7eb, x, -0.08, z);
      spoke.rotation.x = (Math.PI / 6) * i;
      car.add(spoke);
    }
  }

  createWheel(1.45, 1.12);
  createWheel(-1.45, 1.12);
  createWheel(1.45, -1.12);
  createWheel(-1.45, -1.12);

  // Wheel arches
  car.add(box(1.15, 0.18, 0.12, 0x0f172a, 1.45, 0.22, 1.08));
  car.add(box(1.15, 0.18, 0.12, 0x0f172a, -1.45, 0.22, 1.08));
  car.add(box(1.15, 0.18, 0.12, 0x0f172a, 1.45, 0.22, -1.08));
  car.add(box(1.15, 0.18, 0.12, 0x0f172a, -1.45, 0.22, -1.08));

  scene.add(car);

  // ---------- Road ----------
  const road = new THREE.Mesh(
    new THREE.BoxGeometry(20, 0.08, 8),
    new THREE.MeshStandardMaterial({ color: 0x2f3542 })
  );
  road.position.y = -0.62;
  road.receiveShadow = true;
  scene.add(road);

  // Road lane markings
  for (let x = -8; x <= 8; x += 3) {
    const line = box(1.4, 0.03, 0.08, 0xffffff, x, -0.55, 0);
    line.receiveShadow = true;
    scene.add(line);
  }

  // ---------- Animation ----------
  function animate() {
    requestAnimationFrame(animate);

    car.rotation.y += 0.006;

    renderer.render(scene, camera);
  }

  animate();

  // ---------- Resize ----------
  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
