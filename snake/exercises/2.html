<!DOCTYPE html>
<html>
<head>
  <title>Exercise 2 - Board Grid</title>
  <style>
    body { margin: 0; overflow: hidden; background: #07111f; }
  </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07111f);

const camera = new THREE.PerspectiveCamera(100, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 4, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const light = new THREE.AmbientLight(0xffffff, 2);
light.position.set(1, 1, 2);

scene.add(light);

const BOARD_SIZE = 15;
const half = BOARD_SIZE / 2;

const board = new THREE.Mesh(
    new THREE.BoxGeometry(BOARD_SIZE, 5, BOARD_SIZE),
    new THREE.MeshStandardMaterial({ color: 0x12233a })
);
board.position.y = -3;
scene.add(board);

const points = [];

for (let i = -half; i <= half; i++) {
    points.push(new THREE.Vector3(i, 2, -half));
    points.push(new THREE.Vector3(i, 2, half));

    points.push(new THREE.Vector3(-half, 2, i));
    points.push(new THREE.Vector3(half, 2, i));
}

const grid = new THREE.LineSegments(
    new THREE.BufferGeometry().setFromPoints(points),
    new THREE.LineBasicMaterial({ color: 0x4f789e })
);
scene.add(grid);

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
