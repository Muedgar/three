<!DOCTYPE html>
<html>
<head>
  <title>Exercise 8 - Grow Snake</title>
  <style>
    body { margin: 0; overflow: hidden; background: #07111f; }
    #score {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: Arial;
      font-size: 26px;
      font-weight: bold;
    }
  </style>
</head>
<body>
<div id="score">Score: 0</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07111f);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(10, 12, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const BOARD_SIZE = 15;
const limit = Math.floor(BOARD_SIZE / 2);

let snake = [
  { x: 0, z: 0 },
  { x: -1, z: 0 },
  { x: -2, z: 0 }
];

let direction = { x: 1, z: 0 };
let food = { x: 4, z: 4 };
let score = 0;
let snakeMeshes = [];

const scoreEl = document.getElementById("score");

const cubeGeometry = new THREE.BoxGeometry(0.85, 0.85, 0.85);
const foodGeometry = new THREE.SphereGeometry(0.42, 32, 32);

const snakeMaterial = new THREE.MeshStandardMaterial({ color: 0x33ff99 });
const headMaterial = new THREE.MeshStandardMaterial({ color: 0xc8ff4d });
const foodMaterial = new THREE.MeshStandardMaterial({ color: 0xff3d71 });

const foodMesh = new THREE.Mesh(foodGeometry, foodMaterial);
scene.add(foodMesh);

function syncSnakeMeshes() {
  while (snakeMeshes.length < snake.length) {
    const mesh = new THREE.Mesh(cubeGeometry, snakeMaterial);
    scene.add(mesh);
    snakeMeshes.push(mesh);
  }

  snake.forEach((part, index) => {
    const mesh = snakeMeshes[index];
    mesh.position.set(part.x, 0.45, part.z);
    mesh.material = index === 0 ? headMaterial : snakeMaterial;
  });
}

function moveSnake() {
  const head = snake[0];

  const newHead = {
    x: head.x + direction.x,
    z: head.z + direction.z
  };

  snake.unshift(newHead);

  const ateFood = newHead.x === food.x && newHead.z === food.z;

  if (ateFood) {
    score++;
    scoreEl.textContent = `Score: ${score}`;
    spawnFood();
  } else {
    snake.pop();
  }

  syncSnakeMeshes();
}

function spawnFood() {
  let newFood;

  do {
    newFood = {
      x: randomInt(-limit, limit),
      z: randomInt(-limit, limit)
    };
  } while (snake.some(part => part.x === newFood.x && part.z === newFood.z));

  food = newFood;
  foodMesh.position.set(food.x, 0.5, food.z);
}

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

window.addEventListener("keydown", event => {
  const key = event.key.toLowerCase();

  if (key === "arrowup" || key === "w") direction = { x: 0, z: -1 };
  if (key === "arrowdown" || key === "s") direction = { x: 0, z: 1 };
  if (key === "arrowleft" || key === "a") direction = { x: -1, z: 0 };
  if (key === "arrowright" || key === "d") direction = { x: 1, z: 0 };
});

let lastMoveTime = 0;

function animate(time) {
  requestAnimationFrame(animate);

  if (time - lastMoveTime > 180) {
    moveSnake();
    lastMoveTime = time;
  }

  foodMesh.rotation.y += 0.04;

  renderer.render(scene, camera);
}

spawnFood();
syncSnakeMeshes();
animate(0);
</script>
</body>
</html>
