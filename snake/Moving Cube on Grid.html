<!DOCTYPE html>
<html>
<head>
  <title>Exercise 4 - Moving Cube</title>
  <style>
    body { margin: 0; overflow: hidden; background: #07111f; }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      color: white;
      font-family: Arial;
      background: rgba(0,0,0,0.5);
      padding: 12px 16px;
      border-radius: 12px;
    }
  </style>
</head>
<body>
<div id="ui">Move: Arrow Keys / WASD</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "three";

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07111f);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(10, 12, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const cube = new THREE.Mesh(
  new THREE.BoxGeometry(0.85, 0.85, 0.85),
  new THREE.MeshStandardMaterial({ color: 0x33ff99 })
);
cube.position.y = 0.45;
scene.add(cube);

let position = { x: 0, z: 0 };
let direction = { x: 1, z: 0 };
let lastMoveTime = 0;
const MOVE_EVERY_MS = 200;

window.addEventListener("keydown", event => {
  const key = event.key.toLowerCase();

  if (key === "arrowup" || key === "w") direction = { x: 0, z: -1 };
  if (key === "arrowdown" || key === "s") direction = { x: 0, z: 1 };
  if (key === "arrowleft" || key === "a") direction = { x: -1, z: 0 };
  if (key === "arrowright" || key === "d") direction = { x: 1, z: 0 };
});

function moveCube() {
  position.x += direction.x;
  position.z += direction.z;
  cube.position.set(position.x, 0.45, position.z);
}

function animate(time) {
  requestAnimationFrame(animate);

  if (time - lastMoveTime > MOVE_EVERY_MS) {
    moveCube();
    lastMoveTime = time;
  }

  renderer.render(scene, camera);
}

animate(0);
</script>
</body>
</html>
